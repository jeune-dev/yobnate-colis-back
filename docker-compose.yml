services:

  # ─────────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yobnate_colis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:        ${DB_NAME:-yobnate_colis}
      POSTGRES_USER:      ${DB_USER:-yobnate}
      POSTGRES_PASSWORD:  ${DB_PASSWORD:-yobante_password}

    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yobnate} -d ${DB_NAME:-yobnate_colis}"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ─────────────────────────────────────────
  # Backend Node.js
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yobnate_colis
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV:  ${NODE_ENV:-development}
      PORT:      3000
      HOST:      0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Base de données — pointe vers le service postgres ci-dessus
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      ${DB_NAME:-yobnate_colis}
      DB_USER:      ${DB_USER:-yobnate}
      DB_PASSWORD:  ${DB_PASSWORD:-yobante_password}

      # JWT — les 3 secrets doivent être définis et différents (voir config/security.js)
      JWT_SECRET:          ${JWT_SECRET}
      JWT_EXPIRES_IN:      ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET}
      JWT_RESET_SECRET:    ${JWT_RESET_SECRET}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

      # Super admin (utilisé par npm run seed — PAS de fallback hardcodé)
      SUPER_ADMIN_EMAIL:    ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SUPER_ADMIN_NOM:      ${SUPER_ADMIN_NOM:-Admin}
      SUPER_ADMIN_PRENOM:   ${SUPER_ADMIN_PRENOM:-Yobnate}

      # Email — SMTP (nodemailer)
      SMTP_HOST:     ${SMTP_HOST}
      SMTP_PORT:     ${SMTP_PORT:-587}
      SMTP_SECURE:   ${SMTP_SECURE:-false}
      SMTP_USER:     ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM:     ${MAIL_FROM}

      # Cloudinary (upload images)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:    ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

volumes:
  postgres_data:
