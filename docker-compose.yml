services:
  db:
    image: postgres:16-alpine
    container_name: yobnate_colis_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-yobnate_colis}
      POSTGRES_USER: ${DB_USER:-yobnate}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - yobnate_colis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-yobnate} -d ${DB_NAME:-yobnate_colis}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: yobnate_colis_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  yobnate_colis_pgdata:
